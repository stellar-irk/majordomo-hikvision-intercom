<script>
    function hik_restart_cycle () {
        var url="/ajax/xray.html?action=service";
        $.post(url,
            { action:"service", ajax: "1", "cycle": "hikvision", "op": "restart"}
        );
        return false;
    }

    function hik_stop_cycle () {
        var url="/ajax/xray.html?action=service";
        $.post(url,
            { action:"service", ajax: "1", "cycle": "hikvision", "op": "stop"}
        );
        return false;
    }

    function hik_update_cycle_status () {
        var url="/ajax/xray.html?action=service";
        $.post(url,
            { action:"service", ajax: "1", "cycle": "hikvision"},
            function(data) {
                console.log(data.ONLINE);
                $('#hik-cycle-status-icon').attr("data-status-id", data.ONLINE);
                if (data.ONLINE == 1) $('#hik-cycle-status').html("Online"); else $('#hik-cycle-status').html("Offline");
            }
        );
        return false;
    }

    setInterval(hik_update_cycle_status, 2000);
</script>
